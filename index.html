<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinata</title>
    <link rel="stylesheet" href="./assets/css/style.css">
     <link rel="shortcut icon" href="./assets/images/Lakitu.Favicon.png"/>
</head>

<body class="page-accueil_3">

    <div id="homeOverlay" class="home-overlay">
    <div class="cloud-door top"></div>
    <div class="cloud-door bottom"></div>

    <div class="home-content">
        <h1 class="welcome-title">ARE YOU READY ?</h1>
        <div class="action-area">
            <button id="enterBtn">START</button>
            <p class="press-start">Appuyez sur Espace ou Entrée</p>
        </div>
    </div>
</div>

    <main class="menu-container">
        
        <div class="logo-area">
            <img src="./assets/images/Logo_Pinata.png" alt="Piñata Logo" class="main-logo">
        </div>

        <nav class="nav-bar">
            <div class="nav-line"></div> <div class="buttons-wrapper">
                <a href="./pages/règles.html" class="menu-btn">JOUER</a>
                <a href="./pages/scores.html" class="menu-btn">SCORES</a>
                <a href="./pages/badges.html" class="menu-btn">BADGES</a>
            </div>
        </nav>
    </main>

   <button id="homeSettingsBtn" class="floating-settings">
    <div class="gear-icon">
        <div class="gear-inner"></div>
    </div>
</button>

    
<div id="badgeNotificationContainer"></div>


<div id="settingsOverlay" class="modal-overlay">
    <div class="modal-content settings-box">
        <h2 class="pause-title" style="color: #000; margin-bottom: 20px;">RÉGLAGES</h2>
        
        <div class="setting-item">
            <label>Musique</label>
            <input type="range" id="musicVolume" min="0" max="1" step="0.1" value="0.5">
        </div>

        <div class="setting-item">
            <label>Bruitages</label>
            <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7">
        </div>

        <button id="closeSettingsBtn" class="btn-pause-menu" style="margin-top: 20px;">OK</button>
    </div>
</div>

    <audio id="bgMusic" src="./assets/sounds/Home_Music.mp3" loop></audio>
    <audio id="clickSound" src="./assets/sounds/Demarrage.mp3"></audio>
    <audio id="btnClickSound" src="./assets/sounds/Game_Entry.mp3" preload="auto"></audio>
    <audio id="badgeSound" src="./assets/sounds/Achievement.mp3" preload="auto"></audio>

<script>
    // --- DONNÉES DES BADGES (Ajout du badge SiV) ---
    const badgeData = [
        { id: 'settings_pro', category: 'CoP', name: "Curieux", desc: "Ouvrir le menu des paramètres avant de lancer une partie.", img: "./assets/images/gear3.png" },
        { id: 'click_start', category: 'SiV', name: "Traditionnel", desc: "Lancer l'expérience en cliquant sur le bouton Start.", img: "./assets/images/gear2.png" }
    ];

    const bgMusic = document.getElementById('bgMusic');
    const clickSound = document.getElementById('clickSound'); 
    const btnClickSound = document.getElementById('btnClickSound'); 
    const homeOverlay = document.getElementById('homeOverlay');
    const enterBtn = document.getElementById('enterBtn');
    const menuButtons = document.querySelectorAll('.menu-btn');

    const settingsOverlay = document.getElementById('settingsOverlay');
    const homeSettingsBtn = document.getElementById('homeSettingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const musicSlider = document.getElementById('musicVolume');
    const sfxSlider = document.getElementById('sfxVolume');

    let isStarted = false;

    window.addEventListener('DOMContentLoaded', () => {
        const savedMusic = localStorage.getItem('musicVol') || 0.5;
        const savedSfx = localStorage.getItem('sfxVol') || 0.7;
        
        musicSlider.value = savedMusic;
        sfxSlider.value = savedSfx;
        
        if (bgMusic) bgMusic.volume = savedMusic;
    });

    musicSlider.oninput = () => {
        if (bgMusic) bgMusic.volume = musicSlider.value;
        localStorage.setItem('musicVol', musicSlider.value); 
    };

    sfxSlider.oninput = () => {
        localStorage.setItem('sfxVol', sfxSlider.value);
    };

    if (homeSettingsBtn) {
        homeSettingsBtn.onclick = () => {
            settingsOverlay.style.display = 'flex';
            unlockBadge('settings_pro');
        };
    }

    // Fonction universelle de déblocage
    function unlockBadge(badgeId) {
        let unlocked = JSON.parse(localStorage.getItem('unlockedBadges')) || [];
        let newBadges = JSON.parse(localStorage.getItem('newBadges')) || [];

        if (!unlocked.includes(badgeId)) {
            unlocked.push(badgeId);
            newBadges.push(badgeId); 
            localStorage.setItem('unlockedBadges', JSON.stringify(unlocked));
            localStorage.setItem('newBadges', JSON.stringify(newBadges));
            
            const badge = badgeData.find(b => b.id === badgeId);
            if (badge) {
                const sound = document.getElementById('badgeSound');
                if (sound) {
                    sound.currentTime = 0;
                    sound.volume = localStorage.getItem('sfxVol') || 0.7;
                    sound.play().catch(e => console.log("Audio bloqué"));
                }

                const container = document.getElementById('badgeNotificationContainer');
                if (container) {
                    const notif = document.createElement('div');
                    notif.className = 'badge-notification';
                    notif.innerHTML = `
                        <div class="badge-icon-notify"><img src="${badge.img}" alt="Icon"></div>
                        <div class="badge-info-notify">
                            <p class="title-notif">Badge Débloqué !</p>
                            <p class="name-notif">${badge.name}</p>
                        </div>`;
                    container.appendChild(notif);
                    setTimeout(() => notif.classList.add('show'), 100);
                    setTimeout(() => {
                        notif.classList.remove('show');
                        setTimeout(() => notif.remove(), 500);
                    }, 2000);
                }
            }
        }
    }

    closeSettingsBtn.onclick = () => {
        localStorage.setItem('musicVol', musicSlider.value);
        localStorage.setItem('sfxVol', sfxSlider.value);
        settingsOverlay.style.display = 'none';
    };

    // Modification pour détecter l'origine de l'activation (isClick)
    function startExperience(isClick = false) {
        if (isStarted) return;
        
        // Si l'utilisateur a cliqué sur le bouton au lieu du clavier
        if (isClick === true) {
            unlockBadge('click_start');
        }

        isStarted = true;
        homeOverlay.classList.add('opened');
        
        if(clickSound) {
            clickSound.volume = localStorage.getItem('sfxVol') || 0.7;
            clickSound.play();
        }

        setTimeout(() => { homeOverlay.style.display = 'none'; }, 1200); 

        if (bgMusic) {
            bgMusic.volume = 0;
            bgMusic.play().then(() => {
                let targetVol = parseFloat(musicSlider.value);
                let fade = setInterval(() => {
                    if (bgMusic.volume < targetVol) {
                        bgMusic.volume = Math.min(targetVol, bgMusic.volume + 0.05);
                    } else { 
                        clearInterval(fade); 
                    }
                }, 100);
            }).catch(e => console.log("L'audio attend une interaction."));
        }
    }

    menuButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            const targetUrl = this.getAttribute('href');
            if (!targetUrl || targetUrl === "#") return;
            e.preventDefault(); 

            this.innerText = "LOAD...";
            this.style.opacity = "0.8";
            this.style.pointerEvents = "none"; 

            if (btnClickSound) {
                btnClickSound.volume = localStorage.getItem('sfxVol') || 0.7;
                btnClickSound.currentTime = 0;
                btnClickSound.play();
            }

            if (bgMusic) {
                let fadeOutInterval = setInterval(() => {
                    if (bgMusic.volume > 0.1) { 
                        bgMusic.volume -= 0.1; 
                    } else { 
                        bgMusic.pause(); 
                        clearInterval(fadeOutInterval); 
                    }
                }, 40);
            }

            setTimeout(() => { window.location.href = targetUrl; }, 1900); 
        });
    });

    // On passe 'true' ici car c'est l'événement de clic
    if (enterBtn) enterBtn.onclick = () => startExperience(true);

    document.addEventListener('keydown', (e) => {
        // Ici on ne passe rien, donc isClick restera false par défaut
        if (e.code === 'Space' || e.code === 'Enter') startExperience();
    });
</script>
</body>
</html>
