    <div id="settingsOverlay" class="modal-overlay">

            <h2 class="pause-title" style="color: #000; margin-bottom: 20px;">RÉGLAGES</h2>
            <div class="setting-item">
                <label>Musique</label>
                <input type="range" id="musicVolume" min="0" max="1" step="0.1" value="0.5">
            </div>
            <div class="setting-item">
                <label>Bruitages</label>
                <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7">
            </div>
            <button id="closeSettingsBtn" class="btn-pause-menu" style="margin-top: 20px;">OK</button>
        </div>
    </div>


<audio id="badgeMusic" src="../assets/sounds/Badges.mp3" loop preload="auto"></audio>

    window.addEventListener('DOMContentLoaded', () => {
        const savedMusic = localStorage.getItem('musicVol') || 0.5;
        const savedSfx = localStorage.getItem('sfxVol') || 0.7;
        musicSlider.value = savedMusic;
        sfxSlider.value = savedSfx;
        if (badgeMusic) {
            badgeMusic.volume = savedMusic;
            badgeMusic.play().catch(() => {
                document.addEventListener('click', () => { if(badgeMusic.paused) badgeMusic.play(); }, { once: true });
            });
        }
    });

            settingsOverlay.style.display = 'flex';

    }
    if (closeSettingsBtn) {
        closeSettingsBtn.onclick = () => settingsOverlay.style.display = 'none';
    }

        if (badgeMusic) badgeMusic.volume = musicSlider.value;
        localStorage.setItem('musicVol', musicSlider.value);

    // --- FONCTION DE DÉBLOCAGE ET NOTIFICATION VISUELLE ---
    function unlockBadge(badgeId) {
        let unlocked = JSON.parse(localStorage.getItem('unlockedBadges')) || [];
        let newBadges = JSON.parse(localStorage.getItem('newBadges')) || [];

        if (!unlocked.includes(badgeId)) {
            unlocked.push(badgeId);
            newBadges.push(badgeId); 
            localStorage.setItem('unlockedBadges', JSON.stringify(unlocked));
            localStorage.setItem('newBadges', JSON.stringify(newBadges));
            
            const badge = badgeData.find(b => b.id === badgeId);
            if (badge) {
                // Son du badge
                const sound = document.getElementById('badgeSound');
                if (sound) {
                    sound.currentTime = 0;
                    sound.volume = localStorage.getItem('sfxVol') || 0.7;
                    sound.play().catch(e => console.log("Audio blocked"));
                }

                // Notification visuelle
                const container = document.getElementById('badgeNotificationContainer');
                if (container) {
                    const notif = document.createElement('div');
                    notif.className = 'badge-notification';
                    notif.innerHTML = `
                        <div class="badge-icon-notify"><img src="${badge.img}" alt="Icon"></div>
                        <div class="badge-info-notify">
                            <p class="title-notif">Badge Débloqué !</p>
                            <p class="name-notif">${badge.name}</p>
                        </div>`;
                    container.appendChild(notif);
                    setTimeout(() => notif.classList.add('show'), 100);
                    setTimeout(() => {
                        notif.classList.remove('show');
                        setTimeout(() => notif.remove(), 600);
                    }, 5000);
                }
                // Actualiser les pastilles rouges sans recharger la page
                updateTabNotifications();
            }
        }
    }

    // --- FONCTION NOTIFICATION ONGLETS ---
    function updateTabNotifications() {
        const newBadges = JSON.parse(localStorage.getItem('newBadges')) || [];
        const tabs = document.querySelectorAll('.tab');

        tabs.forEach(tab => {
            const category = tab.textContent;
            const hasNewInThisCategory = newBadges.some(badgeId => {
                const badge = badgeData.find(b => b.id === badgeId);
                return badge && badge.category === category;
            });

            if (hasNewInThisCategory) {
                tab.classList.add('tab-notify');
            } else {
                tab.classList.remove('tab-notify');
            }
        });
    }

    // 4. INITIALISATION GRILLE ET ONGLETS
    window.onload = () => {
        const grid = document.getElementById('badgeGrid');
        const tabs = document.querySelectorAll('.tab');

        function renderBadges(categoryFilter) {
            grid.innerHTML = ""; 
            const unlockedBadges = JSON.parse(localStorage.getItem('unlockedBadges')) || [];
            const newBadges = JSON.parse(localStorage.getItem('newBadges')) || [];
            const sfxVol = parseFloat(localStorage.getItem('sfxVol') || 0.7);

            const filteredBadges = badgeData.filter(b => b.category === categoryFilter);

            filteredBadges.forEach(badge => {
                const isUnlocked = unlockedBadges.includes(badge.id);
                const isNew = newBadges.includes(badge.id);

                const item = document.createElement('div');
                item.className = `badge-item ${isUnlocked ? 'unlocked' : 'locked'} ${isUnlocked && isNew ? 'new-badge' : ''}`;
                
                item.innerHTML = isUnlocked 
                    ? `<img src="${badge.img}" alt="${badge.name}">`
                    : `<div class="lock-icon">?</div>`;

                item.onclick = () => {
                    const sndPath = isUnlocked ? '../assets/sounds/Open_Rules.mp3' : '../assets/sounds/Blocked.mp3';
                    const snd = new Audio(sndPath);
                    snd.volume = sfxVol;
                    snd.play();
                    
                    if (isUnlocked) {
                        showDetails(badge);
                        if (item.classList.contains('new-badge')) {
                            item.classList.remove('new-badge');
                            const currentNew = JSON.parse(localStorage.getItem('newBadges')) || [];
                            const updatedNew = currentNew.filter(id => id !== badge.id);
                            localStorage.setItem('newBadges', JSON.stringify(updatedNew));
                            updateTabNotifications();
                        }
                    } else {
                        showDetails({ name: "???", desc: "Contenu verrouillé. Continuez à jouer !", img: "../assets/images/Unknown.png" });
                    }
                };
                if (grid) grid.appendChild(item);
            });
        }

        // Gestion du clic sur les onglets
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const sfxVol = parseFloat(localStorage.getItem('sfxVol') || 0.7);
                const tabSnd = new Audio('../assets/sounds/TabsSound.mp3');
                tabSnd.volume = sfxVol;
                tabSnd.play();

                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                tab.classList.remove('tab-notify');
                
                renderBadges(tab.textContent); 
            });
        });

        // Initialisation
        renderBadges('CoP');
        updateTabNotifications();

        // BOUTONS NAVIGATION
        const rulesBtn = document.querySelector('.btn-rect-rules');
        if (rulesBtn) {
            rulesBtn.onclick = (e) => {
                e.preventDefault();
                const sfxVol = parseFloat(localStorage.getItem('sfxVol') || 0.7);
                const snd = new Audio('../assets/sounds/Game_Entry.mp3');
                snd.volume = sfxVol;
                snd.play();
                rulesBtn.innerText = "CHARGEMENT...";
                rulesBtn.style.opacity = "0.6";
                setTimeout(() => { window.location.href = rulesBtn.getAttribute('href'); }, 2000);
            };
        }

        const backBtn = document.querySelector('.back-btn');
        if (backBtn) {
            backBtn.onclick = (e) => {
                e.preventDefault();
                const sfxVol = parseFloat(localStorage.getItem('sfxVol') || 0.7);
                const snd = new Audio('../assets/sounds/Return.mp3');
                snd.volume = sfxVol;
                snd.play();
                backBtn.innerText = "HOME...";
                backBtn.style.opacity = "0.6";
                setTimeout(() => { window.location.href = '../index.html'; }, 2000);
            };
        }
    };

    function showDetails(badge) {
        const detailImg = document.getElementById('detailImg');
        const detailName = document.getElementById('detailName');
        const detailDesc = document.getElementById('detailDesc');
        
        const photoContainer = detailImg.parentElement;

        detailImg.src = badge.img;
        detailName.textContent = badge.name;
        detailDesc.textContent = badge.desc;

        // Condition pour le fond de la carte :
        // Si l'image est le cadenas (Unknown.png), le fond est blanc
        if (badge.img === "../assets/images/Unknown.png") {
            photoContainer.style.backgroundColor = "#ffffff";
            photoContainer.classList.remove('unlocked-photo-bg');
        } else {
            // Sinon (badge débloqué), on enlève le blanc et on laisse ta classe unlocked-photo-bg (noir) s'appliquer
            photoContainer.style.backgroundColor = ""; 
            photoContainer.classList.add('unlocked-photo-bg');
        }
    }
</script>
