<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Collections - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
</head>
<body class="badge-page">

    <div class="badge-main-container">
        <div class="notebook">
            <div class="notebook-header">
                <button class="back-btn" onclick="window.location.href='../index.html'">BACK</button>
                <div class="game-tabs">
                    <span class="tab active">BtB</span>
                    <span class="tab">EtP</span>
                    <span class="tab">StD</span>
                    <span class="tab">ItA</span>
                </div>
            </div>

            <div class="notebook-content">
                <div class="badge-grid" id="badgeGrid">
                    </div>
                
                <div class="page-numbers">
                    <div class="page-btn active">1</div>
                    <div class="page-btn">2</div>
                </div>
            </div>
        </div>

        <div class="details-card" id="detailsCard">
            <div class="card-inner">
                <div class="card-photo">
                    <img src="../assets/images/placeholder_badge.png" id="detailImg" alt="Badge">
                </div>
                <div class="card-name" id="detailName">???</div>
                <div class="card-description">
                    <p id="detailDesc">Clique sur un badge pour voir ses détails.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration des badges (ID, Nom, Description, Image)
        const badgeData = [
            { id: 'first_kill', name: "Premier Sang", desc: "Vous avez éliminé votre première cible.", img: "../assets/images/Laki1.png" },
            { id: 'combo_10', name: "Série de 10", desc: "Atteindre un combo de 10 sans rater.", img: "../assets/images/Laki2.png" },
            { id: 'lakitu_slayer', name: "Chasseur de Lakitu", desc: "Éliminer Lakitu 5 fois dans une partie.", img: "../assets/images/Laki3.png" },
            { id: 'dog_lover', name: "Ami des Animaux", desc: "Cliquer sur le chien secret.", img: "../assets/images/badges/b4.png" },
            { id: 'perfect_game', name: "Score Parfait", desc: "Terminer un niveau avec 100% de précision.", img: "../assets/images/badges/b5.png" },
            // Ajoute autant de badges que tu veux pour remplir la grille (20 par page idéalement)
        ];

        window.onload = () => {
            const grid = document.getElementById('badgeGrid');
            // Récupérer les badges débloqués dans le localStorage
            const unlockedBadges = JSON.parse(localStorage.getItem('unlockedBadges')) || [];

            badgeData.forEach(badge => {
                const isUnlocked = unlockedBadges.includes(badge.id);
                
                const item = document.createElement('div');
                item.className = `badge-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                // Si verrouillé, on met un point d'interrogation ou une ombre
                item.innerHTML = isUnlocked 
                    ? `<img src="${badge.img}" alt="${badge.name}">`
                    : `<div class="lock-icon">?</div>`;

                item.onclick = () => {
                    if (isUnlocked) {
                        showDetails(badge);
                    } else {
                        showDetails({ name: "???", desc: "Contenu verrouillé. Continuez à jouer pour le découvrir !", img: "../assets/images/lock_placeholder.png" });
                    }
                };

                grid.appendChild(item);
            });
        };

        function showDetails(badge) {
            document.getElementById('detailImg').src = badge.img;
            document.getElementById('detailName').textContent = badge.name;
            document.getElementById('detailDesc').textContent = badge.desc;
            
            // Petite animation sur la carte
            const card = document.getElementById('detailsCard');
            card.style.transform = "rotate(2deg) scale(1.02)";
            setTimeout(() => card.style.transform = "rotate(0deg) scale(1)", 150);
        }

        /** * FONCTION À UTILISER DANS TON JEU POUR DÉBLOQUER UN BADGE :
         * unlockBadge('combo_10');
         */
        function unlockBadge(id) {
            let unlocked = JSON.parse(localStorage.getItem('unlockedBadges')) || [];
            if (!unlocked.includes(id)) {
                unlocked.push(id);
                localStorage.setItem('unlockedBadges', JSON.stringify(unlocked));
            }
        }
    </script>
</body>
</html>
