<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Collections - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
</head>
<body class="badge-page">

    <div class="badge-main-container">
        <div class="notebook">
            <div class="notebook-header">
                <button class="back-btn">RETOUR</button>
                <div class="game-tabs">
                    <span class="tab active">GoD</span>
                    <span class="tab">SiV</span>
                    <span class="tab">CoP</span>
                    <span class="tab">ItA</span>
                </div>
            </div>

            <div class="notebook-content">
                <div class="badge-grid" id="badgeGrid"></div>
                <div class="page-numbers">
                    <div class="page-btn active">1</div>
                </div>
            </div>
        </div>

        <div class="side-column-container">
            <div class="details-card" id="detailsCard">
                <div class="card-inner">
                    <div class="card-photo">
                        <img src="../assets/images/placeholder_badge.png" id="detailImg" alt="Badge">
                    </div>
                    <div class="card-name" id="detailName">???</div>
                    <div class="card-description">
                        <p id="detailDesc">Clique sur un badge pour voir ses détails.</p>
                    </div>
                </div>
            </div>
            <a href="règles.html" class="btn-rect-rules">JOUER AU JEU</a>
        </div>
    </div>

    <button id="homeSettingsBtn" class="floating-settings">
        <div class="gear-icon">
            <div class="gear-inner"></div>
        </div>
    </button>

    <audio id="badgeMusic" src="../assets/sounds/Badges.mp3" loop preload="auto"></audio>

    <div id="settingsOverlay" class="modal-overlay">
        <div class="modal-content settings-box">
            <h2 class="pause-title" style="color: #000; margin-bottom: 20px;">RÉGLAGES</h2>
            <div class="setting-item">
                <label>Musique</label>
                <input type="range" id="musicVolume" min="0" max="1" step="0.1" value="0.5">
            </div>
            <div class="setting-item">
                <label>Bruitages</label>
                <input type="range" id="sfxVolume" min="0" max="1" step="0.1" value="0.7">
            </div>
            <button id="closeSettingsBtn" class="btn-pause-menu" style="margin-top: 20px;">OK</button>
        </div>
    </div>

<script>
    // 1. SÉLECTION ET SYNC MUSIQUE
    const badgeMusic = document.getElementById('badgeMusic');
    const settingsOverlay = document.getElementById('settingsOverlay');
    const homeSettingsBtn = document.getElementById('homeSettingsBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const musicSlider = document.getElementById('musicVolume');
    const sfxSlider = document.getElementById('sfxVolume');

    // Charger les volumes
    window.addEventListener('DOMContentLoaded', () => {
        const savedMusic = localStorage.getItem('musicVol') || 0.5;
        const savedSfx = localStorage.getItem('sfxVol') || 0.7;
        musicSlider.value = savedMusic;
        sfxSlider.value = savedSfx;
        if (badgeMusic) {
            badgeMusic.volume = savedMusic;
            badgeMusic.play().catch(() => {
                document.addEventListener('click', () => { if(badgeMusic.paused) badgeMusic.play(); }, { once: true });
            });
        }
    });

    // 2. LOGIQUE SETTINGS
    if (homeSettingsBtn) {
        homeSettingsBtn.onclick = () => settingsOverlay.style.display = 'flex';
    }
    if (closeSettingsBtn) {
        closeSettingsBtn.onclick = () => settingsOverlay.style.display = 'none';
    }
    musicSlider.oninput = () => {
        if (badgeMusic) badgeMusic.volume = musicSlider.value;
        localStorage.setItem('musicVol', musicSlider.value);
    };
    sfxSlider.oninput = () => localStorage.setItem('sfxVol', sfxSlider.value);

    // 3. DONNÉES BADGES
    const badgeData = [
        { id: 'first_kill', name: "Premier Sang", desc: "Vous avez éliminé votre première cible.", img: "../assets/images/Laki1.png" },
        { id: 'combo_10', name: "Série de 10", desc: "Atteindre un combo de 10 sans rater.", img: "../assets/images/Laki2.png" },
        { id: 'lakitu_slayer', name: "Chasseur de Lakitu", desc: "Éliminer Lakitu 5 fois dans une partie.", img: "../assets/images/Laki1.png" },
        { id: 'dog_lover', name: "Ami des Animaux", desc: "Cliquer sur le chien secret.", img: "../assets/images/badges/b4.png" },
        { id: 'perfect_game', name: "Score Parfait", desc: "Terminer un niveau avec 100% de précision.", img: "../assets/images/" },
        { id: 'score_5000', name: "Score de Bronze", desc: "Atteindre un score de 5 000 points.", img: "../assets/images/badges/b6.png" },
        { id: 'score_15000', name: "Score d'Argent", desc: "Atteindre un score de 15 000 points.", img: "../assets/images/badges/b7.png" },
        { id: 'yami_hunter', name: "Yami !", desc: "A débusqué un Yami caché.", img: "../assets/images/yami3.png" },
        { id: 'sniper_master', name: "Œil de Lynx", desc: "Éliminer 20 cibles à la suite sans rater un seul tir.", img: "../assets/images/badges/b9.png" },
        { id: 'super_combo', name: "Fureur de Vaincre", desc: "Maintenir un Super Combo pendant plus de 10 secondes.", img: "../assets/images/badges/b10.png" },
        { id: 'world_1_clear', name: "Explorateur des Plaines", desc: "Terminer avec succès le Monde 1.", img: "../assets/images/badges/b16.png" },
        { id: 'world_2_clear', name: "Voyageur des Cieux", desc: "Terminer avec succès le Monde 2.", img: "../assets/images/badges/b17.png" },
        { id: 'world_3_clear', name: "Héros de l'Ombre", desc: "Terminer avec succès le Monde 3.", img: "../assets/images/badges/b18.png" },
        { id: 'game_marathon', name: "Marathonien", desc: "Jouer plus de 10 parties au total.", img: "../assets/images/badges/b19.png" },
        { id: 'ghost_touch', name: "Chasseur de Fantômes", desc: "Cliquer sur une cible en mode Fantôme (Ghost-mode).", img: "../assets/images/badges/b20.png" },
        { id: 'time_saver', name: "Juste à Temps", desc: "Récupérer un bonus de temps quand il reste moins de 3 secondes.", img: "../assets/images/badges/b21.png" },
        { id: 'trigger_happy', name: "Gâchette Facile", desc: "Cliquer plus de 100 fois dans une seule partie.", img: "../assets/images/badges/b22.png" },
        { id: 'peaceful', name: "Pacifiste", desc: "Ne rien toucher pendant les 10 premières secondes d'une partie.", img: "../assets/images/badges/b23.png" },
        { id: 'settings_pro', name: "Curieux", desc: "Ouvrir le menu des paramètres avant de lancer une partie.", img: "../assets/images/badges/b24.png" },
        { id: 'full_collection', name: "Maître des Licornes", desc: "Débloquer tous les autres badges du jeu.", img: "../assets/images/badges/b25.png" }
    ];

    // 4. INITIALISATION GRILLE
    window.onload = () => {
        const grid = document.getElementById('badgeGrid');
        const unlockedBadges = JSON.parse(localStorage.getItem('unlockedBadges')) || [];
        const newBadges = JSON.parse(localStorage.getItem('newBadges')) || []; // Récupération des nouveaux badges
        const sfxVol = parseFloat(localStorage.getItem('sfxVol') || 0.7);

        badgeData.forEach(badge => {
            const isUnlocked = unlockedBadges.includes(badge.id);
            const isNew = newBadges.includes(badge.id);

            const item = document.createElement('div');
            // Ajout de la classe new-badge si nécessaire
            item.className = `badge-item ${isUnlocked ? 'unlocked' : 'locked'} ${isUnlocked && isNew ? 'new-badge' : ''}`;
            
            item.innerHTML = isUnlocked 
                ? `<img src="${badge.img}" alt="${badge.name}">`
                : `<div class="lock-icon">?</div>`;

            item.onclick = () => {
                const sndPath = isUnlocked ? '../assets/sounds/Open_Rules.mp3' : '../assets/sounds/Blocked.mp3';
                const snd = new Audio(sndPath);
                snd.volume = sfxVol;
                snd.play();
                
                if (isUnlocked) {
                    showDetails(badge);
                    
                    // Retrait du point rouge au clic
                    if (item.classList.contains('new-badge')) {
                        item.classList.remove('new-badge');
                        const currentNew = JSON.parse(localStorage.getItem('newBadges')) || [];
                        const updatedNew = currentNew.filter(id => id !== badge.id);
                        localStorage.setItem('newBadges', JSON.stringify(updatedNew));
                    }
                } else {
                    showDetails({ name: "???", desc: "Contenu verrouillé. Continuez à jouer !", img: "../assets/images/lock_placeholder.png" });
                }
            };
            if (grid) grid.appendChild(item);
        });

        // BOUTONS NAVIGATION
        const rulesBtn = document.querySelector('.btn-rect-rules');
        if (rulesBtn) {
            rulesBtn.onclick = (e) => {
                e.preventDefault();
                const snd = new Audio('../assets/sounds/Game_Entry.mp3');
                snd.volume = sfxVol;
                snd.play();
                rulesBtn.innerText = "CHARGEMENT...";
                rulesBtn.style.opacity = "0.6";
                setTimeout(() => { window.location.href = rulesBtn.getAttribute('href'); }, 2000);
            };
        }

        const backBtn = document.querySelector('.back-btn');
        if (backBtn) {
            backBtn.onclick = (e) => {
                e.preventDefault();
                const snd = new Audio('../assets/sounds/Return.mp3');
                snd.volume = sfxVol;
                snd.play();
                backBtn.innerText = "HOME...";
                backBtn.style.opacity = "0.6";
                setTimeout(() => { window.location.href = '../index.html'; }, 2000);
            };
        }
    };

    function showDetails(badge) {
        document.getElementById('detailImg').src = badge.img;
        document.getElementById('detailName').textContent = badge.name;
        document.getElementById('detailDesc').textContent = badge.desc;
    }
</script>
</body>
</html>
