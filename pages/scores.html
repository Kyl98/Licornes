<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Classement - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
</head>

<body class="score-board">
    <h1 class="title">SCORES TOTAUX :</h1>

    <div class="score-list" id="scoreList">
        </div>

    <div class="tap-to-continue" id="btnContinue">
        <span class="flashing-text">APPUYER SUR ESPACE OU ENTRER POUR CONTINUER</span>
    </div>
    <div id="badgeNotificationContainer"></div>

    <audio id="badgeSound" src="../assets/sounds/Achievement.mp3" preload="auto"></audio>
    <audio id="scoreMusic" src="../assets/sounds/S_Scores.mp3" preload="auto"></audio>

  <script>
    window.onload = () => {
    // 1. Lancement du son SYNCHRONISÉ
    const scoreMusic = document.getElementById('scoreMusic');
    if (scoreMusic) {
        // On récupère le volume sauvegardé (par défaut 0.5 si rien n'existe)
        const savedVol = localStorage.getItem('musicVol') || 0.5;
        scoreMusic.volume = parseFloat(savedVol); 
        
        scoreMusic.play().catch(e => {
            console.log("Lecture auto bloquée");
        });
    }

    // 2. Récupération des données (Le reste de ton code ne change pas)
    let leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];
    const lastScore = localStorage.getItem('lastFinalScore');
    const lastName = localStorage.getItem('lastPlayerName');

    // --- LOGIQUE DE MISE À JOUR ---
    if (lastName && lastScore) {
        const alreadyExists = leaderboard.some(entry => 
            entry.name === lastName && entry.score === parseInt(lastScore)
        );

        if (!alreadyExists) {
            leaderboard.push({ name: lastName, score: parseInt(lastScore) });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 15);
            localStorage.setItem('unicornLeaderboard', JSON.stringify(leaderboard));
        }
    }

    const scoreContainer = document.getElementById('scoreList');
    scoreContainer.innerHTML = ""; 

    // 3. Affichage du classement
    leaderboard.forEach((entry, index) => {
        const isSameName = entry.name.trim().toUpperCase() === lastName?.trim().toUpperCase();
        const isSameScore = Number(entry.score) === Number(lastScore);
        const isCurrentPlayer = isSameName && isSameScore;

        const itemClass = isCurrentPlayer ? "score-item current-player" : "score-item";

        scoreContainer.innerHTML += `
            <div class="${itemClass}">
                <div class="rank">${index + 1}</div>
                <div class="score-bar">
                    <span class="name">${entry.name} ${isCurrentPlayer ? "(MOI)" : ""}</span>
                    <span class="value">: ${entry.score}</span>
                </div>
            </div>
        `;
    });

    // --- AJOUT : LOGIQUE DE NOTIFICATION DE BADGE (PENDING BADGE) ---
    const pendingBadgeId = localStorage.getItem('pendingBadge');
    if (pendingBadgeId) {
        const badgesInfo = {
            'rank_1': { name: "Médaille d'Or", img: "../assets/images/trophy1.png" },
            'rank_2': { name: "Médaille d'Argent", img: "../assets/images/trophy2.png" },
            'rank_3': { name: "Médaille de Bronze", img: "../assets/images/trophy3.png" }
        };

        const badge = badgesInfo[pendingBadgeId];
        if (badge) {
            const container = document.getElementById('badgeNotificationContainer');
            const sound = document.getElementById('badgeSound');

            if (container) {
                const notif = document.createElement('div');
                notif.className = 'badge-notification';
                notif.innerHTML = `
                    <div class="badge-icon-notify"><img src="${badge.img}" alt="Icon"></div>
                    <div class="badge-info-notify">
                        <p class="title-notif">Badge Débloqué !</p>
                        <p class="name-notif">${badge.name}</p>
                    </div>`;
                
                container.appendChild(notif);

                if (sound) {
                    sound.volume = localStorage.getItem('sfxVol') || 0.7;
                    sound.play().catch(e => console.log("Audio bloqué"));
                }

                setTimeout(() => notif.classList.add('show'), 500);

                setTimeout(() => {
                    notif.classList.remove('show');
                    setTimeout(() => notif.remove(), 600);
                }, 5000);
            }
        }
        localStorage.removeItem('pendingBadge'); // On nettoie pour éviter les doublons
    }
    // --- FIN DE L'AJOUT ---

    const goToNextPage = () => {
        window.location.href = "remerciments.html";
    };

    const btnContinue = document.getElementById('btnContinue');
    if (btnContinue) {
        btnContinue.onclick = goToNextPage;
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === "Enter" || e.code === "Space") {
            e.preventDefault();
            goToNextPage();
        }
    });
};
</script>
</body>
</html>
