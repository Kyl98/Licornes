<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Remerciements - Unicorn Shooter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="shortcut icon" href="../assets/images/Lakitu.Favicon.png"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="ending-game">

    <div class="credits-layout">
        <h1>Merci d’avoir joué !!</h1>

        <div class="score-final">
            <div class="rank-final" id="finalRank">?</div>
            <div class="final-score-text" id="finalScoreDisplay">Chargement...</div>
        </div>

        <div class="credits-box">
    <img src="../assets/images/Lakitu.png" class="credits-img" id="mainCreditsImg" alt="Lakitu">
    <div class="credits-text" id="dynamicCreditsText">
        </div>
    <img src="" class="credits-img" id="evilCreditsImg" alt="Evil Lakitu" style="display: none;">
</div>

        <div class="buttons">
            <button class="btn" id="btnRetry">Recommencer</button>
            <button class="btn" id="btnHome">Retour à l'accueil</button>
        </div>
    </div>

    <audio id="EndMusic" src="../assets/sounds/Credits_Music.mp3" loop></audio>


<script>
window.onload = () => {
    // 1. Récupération des données
    const lastScore = parseInt(localStorage.getItem('lastFinalScore')) || 0;
    const playerName = localStorage.getItem('lastPlayerName') || "Joueur";
    const leaderboard = JSON.parse(localStorage.getItem('unicornLeaderboard')) || [];

    // 2. Calcul du rang
    const rank = leaderboard.findIndex(e => 
        e.name === playerName && Number(e.score) === lastScore
    ) + 1;

    // 3. Sélection des éléments
    const finalRankElement = document.getElementById('finalRank');
    const scoreBanner = document.querySelector('.score-final');
    const finalScoreDisplay = document.getElementById('finalScoreDisplay');
    const creditsBox = document.querySelector('.credits-box');
    const creditsText = document.getElementById('dynamicCreditsText');
    const btnRetry = document.getElementById('btnRetry');
    const btnHome = document.getElementById('btnHome');
    const endMusic = document.getElementById('EndMusic'); 

    // --- LOGIQUE DE MUSIQUE (FONCTION DE SECOURS) ---
    const playEndMusic = () => {
        if (endMusic && endMusic.paused) {
            const savedVol = localStorage.getItem('musicVol') || 0.5;
            endMusic.volume = parseFloat(savedVol);
            endMusic.play()
                .then(() => {
                    // Si la musique démarre, on peut enlever l'écouteur de clic de secours
                    document.removeEventListener('click', playEndMusic);
                })
                .catch(e => console.log("Lecture auto bloquée, en attente d'un clic."));
        }
    };

    // Tentative immédiate au chargement
    playEndMusic();

    // Ajout de l'écouteur pour relancer au clic si bloqué par le navigateur (F5 ou autre)
    document.addEventListener('click', playEndMusic);

    // Affichage texte initial
    if (finalScoreDisplay) finalScoreDisplay.textContent = `${playerName} : ${lastScore}`;
    if (finalRankElement) finalRankElement.textContent = rank > 0 ? rank : "-";

    // 4. LOGIQUE DYNAMIQUE DU PODIUM
let confettiColors = ['#f5c2cf', '#000000']; 
const mainImg = document.getElementById('mainCreditsImg');
const evilImg = document.getElementById('evilCreditsImg');

if (rank >= 1 && rank <= 3) {
    let color = "";
    let mainSrc = "";
    let evilSrc = "";

    if (rank === 1) {
        color = "#FFD700"; 
        confettiColors = ['#FFD700', '#FFF9E3', '#000000'];
        mainSrc = "../assets/images/Rank1Cloud.png";
        evilSrc = "../assets/images/Rank1EvilCloud.png";
    } else if (rank === 2) {
        color = "#C0C0C0"; 
        confettiColors = ['#C0C0C0', '#FFFFFF', '#000000'];
        mainSrc = "../assets/images/Rank2Cloud.png";
        evilSrc = "../assets/images/Rank2EvilCloud.png";
    } else if (rank === 3) {
        color = "#CD7F32"; 
        confettiColors = ['#CD7F32', '#F5E6D7', '#000000'];
        mainSrc = "../assets/images/Rank3Cloud.png";
        evilSrc = "../assets/images/Rank3EvilCloud.png";
    }

    // Application des images de rang
    if (mainImg) mainImg.src = mainSrc;
    if (evilImg) {
        evilImg.src = evilSrc;
        evilImg.style.display = "block"; // On affiche le 2ème nuage
        evilImg.style.marginRight = "20px";
        evilImg.style.marginLeft = "0"; // Reset marge pour l'équilibre
    }

    // Style du cadre (Ta logique existante conservée)
    if (scoreBanner) {
        scoreBanner.style.backgroundColor = "black";
        scoreBanner.style.border = `3px solid ${color}`;
        scoreBanner.style.color = "white";
    }

    if (finalRankElement) {
        finalRankElement.style.backgroundColor = color;
        finalRankElement.style.color = "black";
        finalRankElement.style.fontWeight = "bold";
    }

    if (creditsBox) {
        creditsBox.style.backgroundColor = "black";
        creditsBox.style.border = `4px solid ${color}`; // Bordure un peu plus épaisse pour le top 3
        creditsBox.style.color = "white";
        creditsBox.style.justifyContent = "space-between"; // Aligne les nuages aux extrémités
    }

    [btnRetry, btnHome].forEach(btn => {
        if (btn) {
            btn.style.backgroundColor = color;
            btn.style.color = "black";
            btn.style.fontWeight = "bold";
        }
    });
}

    if (creditsText) {
        creditsText.innerHTML = `
            <p><strong>Bravo ${playerName} !</strong></p>
            <p>Tu termines à la ${rank}${rank === 1 ? 'er' : 'e'} place avec ${lastScore} points.</p>
        `;
    }

    if (typeof confetti === 'function') {
        const fire = (particleCount, velocity, angle, x) => {
            confetti({
                particleCount,
                angle,
                spread: 55,
                origin: { x, y: 0.6 },
                colors: confettiColors
            });
        };
        fire(100, 60, 60, 0.1);  
        fire(100, 60, 120, 0.9); 
        if (rank === 1) {
            setTimeout(() => {
                fire(150, 70, 60, 0.1);  
                fire(150, 70, 120, 0.9); 
            }, 400); 
        }
    }

    const fadeOutAndRedirect = (url) => {
        if (endMusic) {
            let fade = setInterval(() => {
                if (endMusic.volume > 0.1) {
                    endMusic.volume -= 0.1;
                } else {
                    clearInterval(fade);
                    window.location.href = url;
                }
            }, 50);
        } else {
            window.location.href = url;
        }
    };

    if (btnRetry) btnRetry.onclick = () => fadeOutAndRedirect("jeu.html");
    if (btnHome) btnHome.onclick = () => fadeOutAndRedirect("../index.html");
};
</script>
</body>
</html>
